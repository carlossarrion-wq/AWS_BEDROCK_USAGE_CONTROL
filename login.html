<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Bedrock Usage Dashboard - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/aws-sdk@2.1048.0/dist/aws-sdk.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #232f3e;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
            margin: -30px -30px 20px -30px;
        }
        .credentials-form {
            margin-bottom: 20px;
        }
        .credentials-form input {
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .credentials-form button {
            padding: 12px 16px;
            background-color: #63B3ED; /* Light blue color */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        .credentials-form button:hover {
            background-color: #4299E1; /* Slightly darker on hover */
        }
        .alert {
            background-color: #fed7d7;
            border-left: 4px solid #f56565;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>AWS Bedrock Usage Dashboard</h1>
            <p>Login to access your dashboard</p>
        </div>

        <div class="alert" id="error-message">
            <strong>Error:</strong> <span id="error-text"></span>
        </div>

        <div class="credentials-form">
            <h2>AWS Credentials</h2>
            <p>Enter your AWS credentials to access CloudWatch metrics:</p>
            <input type="text" id="access-key" placeholder="Access Key ID">
            <input type="password" id="secret-key" placeholder="Secret Access Key">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <script>
        // AWS Configuration
        const region = 'eu-west-1';
        
        // Login function
        function login() {
            const accessKey = document.getElementById('access-key').value;
            const secretKey = document.getElementById('secret-key').value;
            
            if (!accessKey || !secretKey) {
                showError('Please enter both Access Key ID and Secret Access Key');
                return;
            }
            
            try {
                // Test the credentials by initializing AWS SDK
                AWS.config.update({
                    region: region,
                    credentials: new AWS.Credentials({
                        accessKeyId: accessKey,
                        secretAccessKey: secretKey
                    })
                });
                
                // Store credentials in session storage
                sessionStorage.setItem('aws_access_key', accessKey);
                sessionStorage.setItem('aws_secret_key', secretKey);
                
                // Redirect to dashboard
                window.location.href = 'bedrock_usage_dashboard.html';
            } catch (error) {
                console.error('Error validating credentials:', error);
                showError('Invalid credentials. Please check and try again.');
            }
        }
        
        // Show error message
        function showError(message) {
            const errorElement = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            errorText.textContent = message;
            errorElement.style.display = 'block';
        }
        
        // Check if we were redirected due to missing credentials
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'no_credentials') {
                showError('Session expired or no credentials found. Please login again.');
            }
        });
    </script>
</body>
</html>
